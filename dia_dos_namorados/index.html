<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dia dos Namorados 💘</title>
    <link rel="stylesheet" href="css/namorados.css">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Canvas de estrelas/partículas -->
    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <div class="content">
            <div class="heart-decoration">
                <i class="fas fa-heart"></i>
                <i class="fas fa-heart"></i>
                <i class="fas fa-heart"></i>
            </div>
            
            <h1 class="title">
                <span class="title-line">Uma surpresa</span>
                <span class="title-line highlight">especial</span>
                <span class="title-line">para você</span>
            </h1>
            
            <p class="subtitle">
                Cada momento ao seu lado é único. 
                <br>Hoje, quero compartilhar algo ainda mais especial.
            </p>
            
            <form action="html/namorados2.html" method="GET" class="button-form">
                <button type="submit" class="btn-primary">
                    <span class="btn-text">Aperte aqui e seja feliz</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>
<script>
/* ─── CANVAS DE ESTRELAS ───────────────────────────────────────── */
(function() {
    const canvas = document.getElementById('particle-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, stars = [], sparkles = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function randBetween(a, b) { return a + Math.random() * (b - a); }

    // estrelas fixas
    function initStars() {
        stars = [];
        const count = Math.floor(W * H / 6000);
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: randBetween(0.4, 1.4),
                alpha: randBetween(0.1, 0.6),
                speed: randBetween(0.002, 0.006),
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    // partículas rosa flutuantes
    function spawnSparkle() {
        sparkles.push({
            x: Math.random() * W,
            y: H + 20,
            r: randBetween(1.5, 4),
            alpha: randBetween(0.4, 0.85),
            vx: randBetween(-0.5, 0.5),
            vy: randBetween(-0.6, -1.6),
            color: Math.random() < 0.5 ? '#e8a0a0' : '#d4af7a',
            life: 1
        });
    }

    let frame = 0;
    function draw() {
        ctx.clearRect(0, 0, W, H);

        // estrelas
        const t = frame * 0.01;
        stars.forEach(s => {
            const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 100 + s.phase));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(240,217,176,${a})`;
            ctx.fill();
        });

        // sparkles
        sparkles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.008;
            p.alpha = p.life * 0.85;
            if (p.life <= 0) { sparkles.splice(i, 1); return; }
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.fill();
            ctx.globalAlpha = 1;
        });

        if (frame % 8 === 0 && sparkles.length < 60) spawnSparkle();
        frame++;
        requestAnimationFrame(draw);
    }

    resize();
    initStars();
    draw();
    window.addEventListener('resize', () => { resize(); initStars(); });
})();

/* ─── CORAÇÕES FLUTUANTES (JS) ─────────────────────────────────── */
const emojis = ['❤️','🌹','✨','💖'];
function criarCoracao() {
    const el = document.createElement('div');
    el.classList.add('heart');
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left              = Math.random() * 96 + 'vw';
    el.style.animationDuration = (Math.random() * 4 + 5) + 's';
    el.style.fontSize          = (Math.random() * 15 + 10) + 'px';
    el.style.opacity           = Math.random() * 0.4 + 0.1;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 9000);
}
for (let i = 0; i < 4; i++) setTimeout(criarCoracao, i * 400);
setInterval(criarCoracao, 800);
</script>
</body>
</html>
